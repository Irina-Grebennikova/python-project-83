{% extends "base.html" %}

{% block content %}
<div class="container mt-3">
  <div class="row justify-content-center">
    <div class="col-12 col-md-9 col-lg-7">
      <div class="card bg-light">
        <div class="p-4">
          <h1>Анализатор страниц</h1>
          <p>Бесплатно проверяйте сайты на SEO-пригодность</p>
          <form class="row g-3" action="{{ url_for('main.add_url') }}" method="post">
            <div class="col">
              <label for="url" class="visually-hidden">Website</label>
              <input class="form-control {% if get_flashed_messages() %}is-invalid{% endif %}" id="url" name="url"
                placeholder="https://example.com" value="{{ url|default('') }}" required />
              <div class="invalid-feedback">
                Пожалуйста, введите корректный адрес сайта
              </div>
            </div>
            <div class="col-sm-auto">
              <button type="submit" class="btn btn-primary text-uppercase">
                Проверить
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
